<!DOCTYPE html>
<html>
<head>
<title>Heart Disease Prediction</title>
<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}
form {
    background: white;
    padding: 20px;
    margin: auto;
    width: 60%;
    box-shadow: 0px 0px 10px gray;
}
input {
    padding: 5px;
    margin: 5px;
}
button {
    padding: 10px;
    background: crimson;
    color: white;
    border: none;
}
h2 {
    color: darkred;
}
</style>
</head>
<body>

<h2>Heart Disease Prediction</h2>

<form action="/predict" method="post">

Age: <input type="number" name="age" required><br>
Sex (1=Male, 0=Female): <input type="number" name="sex" required><br>
Chest Pain (0-3): <input type="number" name="cp" required><br>
Resting BP: <input type="number" name="trestbps" required><br>
Cholesterol: <input type="number" name="chol" required><br>
Fasting BS (1/0): <input type="number" name="fbs" required><br>
Rest ECG (0-2): <input type="number" name="restecg" required><br>
Max Heart Rate: <input type="number" name="thalach" required><br>
Exercise Angina (1/0): <input type="number" name="exang" required><br>
Oldpeak: <input type="number" step="0.1" name="oldpeak" required><br>
Slope (0-2): <input type="number" name="slope" required><br>
CA (0-4): <input type="number" name="ca" required><br>
Thal (0-3): <input type="number" name="thal" required><br><br>

<button type="submit">Predict</button>

<h3>{{ result }}</h3>

</form>

</body>
</html>
